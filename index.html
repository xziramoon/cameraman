<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBORG // SCANNER-UPLINK (OPTIMIZED)</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Orbitron:wght@400;700;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --o: #ff6b35; --b: #00d4ff; --g: #00ff9d; --r: #ff2255; --bg0: #010508; --bg1: #030c14; --ln: rgba(0,212,255,.12); --txt: #c8dff0; --txt2: #7aaabf; --f-hud: 'Orbitron', sans-serif; --f-th: 'Sarabun', sans-serif; }
        
        @keyframes scan-beam { 0%{top:-20%} 100%{top:110%} }
        @keyframes pulse-success { 0% { background: var(--bg0); } 50% { background: rgba(0, 255, 157, 0.2); } 100% { background: var(--bg0); } }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--f-th); background: var(--bg0); color: var(--txt); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background 0.3s; }
        body.sync-flash { animation: pulse-success 0.4s ease-out; }

        .header { background: var(--bg1); padding: 15px; border-bottom: 1px solid var(--ln); position: relative; }
        .header h1 { font-family: var(--f-hud); font-size: 16px; color: var(--o); letter-spacing: 2px; }
        
        #status-bar { padding: 8px 15px; font-family: var(--f-hud); font-size: 10px; letter-spacing: 1px; border-bottom: 1px solid var(--ln); background: rgba(0,212,255,.03); color: var(--b); display: flex; justify-content: space-between; }

        .container { padding: 12px; flex: 1; overflow-y: auto; z-index: 10; }
        .panel { background: rgba(6,18,32,.8); border: 1px solid var(--ln); padding: 15px; margin-bottom: 12px; clip-path: polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px); }
        .p-lbl { font-family: var(--f-hud); font-size: 10px; color: var(--o); margin-bottom: 10px; border-bottom: 1px solid rgba(0,212,255,.1); padding-bottom: 5px; }

        .inp { width:100%; background: #000; border: 1px solid var(--ln); color: #fff; padding: 12px; font-size: 16px; outline:none; margin-bottom: 10px; }
        .scan-input { font-family: var(--f-hud); font-size: 20px; color: var(--g); text-align: center; border-color: rgba(0,255,157,.3); }

        .btn { width: 100%; background: transparent; border: 1px solid var(--o); color: var(--o); padding: 12px; font-family: var(--f-hud); font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn.active { background: var(--o); color: #000; }
        .btn-stop { border-color: var(--r); color: var(--r); }

        #reader { width: 100%; display: none; background: #000; border: 1px solid var(--b); overflow: hidden; position: relative; }
        .scan-beam-overlay { position:absolute; left:0; right:0; height:80px; background: linear-gradient(to bottom, transparent, rgba(0,212,255,.2), transparent); pointer-events:none; z-index:19; display: none; }
        .scanning .scan-beam-overlay { display: block; animation: scan-beam 2.5s linear infinite; }

        .result-box { text-align: center; padding: 10px; }
        .result-name { font-size: 18px; font-weight: 700; color: var(--g); min-height: 24px; }
        
        /* SweetAlert Cyberpunk Theme */
        .swal-cyber { background: #061220 !important; color: #fff !important; border: 1px solid var(--b) !important; border-radius: 0 !important; font-family: var(--f-th) !important; }
    </style>
</head>
<body id="main-body">

    <div class="header">
        <h1>CYBORG // SCANNER-UPLINK</h1>
    </div>

    <div id="status-bar">
        <span id="mqtt-stat">OFFLINE</span>
        <span id="db-stat">DB: LOADING...</span>
    </div>

    <div class="container">
        <div class="panel">
            <div class="p-lbl">COMMS CHANNEL</div>
            <div style="display: flex; gap: 8px;">
                <input type="number" id="scanner-id" class="inp" value="1" style="flex: 1; text-align: center;">
                <button class="btn" style="flex: 1;" onclick="setupMQTT()">RE-SYNC</button>
            </div>
        </div>

        <div class="panel" id="scanner-panel">
            <div class="p-lbl">OPTICAL SENSORS</div>
            <button id="cam-btn" class="btn" onclick="toggleCamera()">[ O ] START SCANNER</button>
            
            <div id="reader" style="margin-top: 15px;">
                <div class="scan-beam-overlay"></div>
            </div>

            <form onsubmit="event.preventDefault(); processManualScan();" style="margin-top: 15px;">
                <input type="text" id="barcode-input" class="inp scan-input" placeholder="MANUAL INPUT">
            </form>
        </div>

        <div class="panel">
            <div class="p-lbl">LATEST TELEMETRY</div>
            <div class="result-box">
                <div id="res-code" style="font-family: var(--f-hud); font-size: 12px; color: var(--txt2);">WAITING...</div>
                <div id="res-name" class="result-name">ระบบพร้อมใช้งาน</div>
            </div>
        </div>
    </div>

    <audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script>
        const CONFIG = {
            CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQqTY3e2U2vzLTefmUK35bwNq6Z0c18h_ticdPTC2vcczVDPY4AKoKVxsZRfU2eZYxugE2fPnf2HWMk/pub?gid=57248429&single=true&output=csv",
            GAS_URL: "https://script.google.com/macros/s/AKfycbywVCsNVkfiQUNns17RFkVWv1UQm_jDACO5zw-hUIE-Hg2s1md7lk-ZTDqYGFCzhNIE/exec",
            MQTT_BROKER: 'wss://broker.emqx.io:8084/mqtt'
        };

        let productsMap = new Map(); // ใช้ Map เพื่อความเร็วสูงสุดในการค้นหา 40,000 รายการ
        let mqttClient = null;
        let scanner = null;
        let isScanning = false;

        // 1. Database Loader (Optimized for 40k items)
        function loadDatabase() {
            const dbStat = document.getElementById('db-stat');
            Papa.parse(CONFIG.CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => {
                    productsMap.clear();
                    results.data.forEach(item => {
                        const code = String(item.Barcode || item['บาร์โค้ด'] || "").trim();
                        if(code) productsMap.set(code, item);
                    });
                    dbStat.innerText = `DB: ${productsMap.size} ITEMS`;
                    dbStat.style.color = "var(--g)";
                },
                error: () => {
                    dbStat.innerText = "DB: OFFLINE (CACHE)";
                    dbStat.style.color = "var(--o)";
                }
            });
        }

        // 2. MQTT Logic
        function setupMQTT() {
            if (mqttClient) mqttClient.end();
            const id = document.getElementById('scanner-id').value || "1";
            const stat = document.getElementById('mqtt-stat');
            
            mqttClient = mqtt.connect(CONFIG.MQTT_BROKER, { reconnectPeriod: 5000 });
            mqttClient.on('connect', () => {
                stat.innerText = `CHANNEL ${id}: ONLINE`;
                stat.style.color = "var(--g)";
            });
            mqttClient.on('close', () => {
                stat.innerText = `CHANNEL ${id}: DISCONNECTED`;
                stat.style.color = "var(--r)";
            });
        }

        // 3. Scanner Logic
        async function toggleCamera() {
            const btn = document.getElementById('cam-btn');
            const readerDiv = document.getElementById('reader');
            const panel = document.getElementById('scanner-panel');

            if (isScanning) {
                if(scanner) await scanner.stop();
                readerDiv.style.display = "none";
                panel.classList.remove('scanning');
                btn.innerText = "[ O ] START SCANNER";
                btn.classList.remove('btn-stop');
                isScanning = false;
            } else {
                readerDiv.style.display = "block";
                panel.classList.add('scanning');
                btn.innerText = "[ X ] STOP SCANNER";
                btn.classList.add('btn-stop');

                scanner = new Html5Qrcode("reader");
                const config = { 
                    fps: 10, // ลด FPS เพื่อลดความร้อน
                    qrbox: { width: 250, height: 150 },
                    aspectRatio: 1.0,
                    formatsToSupport: [ 
                        Html5QrcodeSupportedFormats.EAN_13, 
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.UPC_A 
                    ]
                };

                scanner.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => {
                    Swal.fire({ icon: 'error', title: 'CAMERA ERROR', text: 'เข้าถึงกล้องไม่ได้', customClass: {popup: 'swal-cyber'} });
                    toggleCamera();
                });
                isScanning = true;
            }
        }

        function onScanSuccess(decodedText) {
            handleProcess(decodedText.trim());
        }

        function processManualScan() {
            const input = document.getElementById('barcode-input');
            if(input.value) handleProcess(input.value.trim());
            input.value = '';
        }

        // 4. Core Logic (Search & Feedback)
        async function handleProcess(barcode) {
            if (scanner && scanner.getState() === 2) scanner.pause();

            // Feedback ทันที
            document.getElementById('beep').play().catch(()=>{});
            if (navigator.vibrate) navigator.vibrate(50);
            
            const product = productsMap.get(barcode);
            const name = product ? (product.ProductName || product['ชื่อสินค้า'] || "ไม่ทราบชื่อ") : "สินค้าใหม่";
            const price = product ? (product.Price || product['ราคาขาย'] || "0.00") : "0.00";

            document.getElementById('res-code').innerText = `CODE: ${barcode}`;
            document.getElementById('res-name').innerText = "กำลังรอคำสั่ง...";

            Swal.fire({
                title: 'FOUND DATA',
                html: `<b style="color:var(--b)">${barcode}</b><br><h2 style="margin:10px 0">${name}</h2><div style="font-size:30px; color:var(--o)">฿${price}</div>`,
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: 'SEND TO PRINT',
                denyButtonText: 'EDIT PRICE',
                customClass: { popup: 'swal-cyber', confirmButton: 'btn', denyButton: 'btn', cancelButton: 'btn' }
            }).then((result) => {
                if (result.isConfirmed) {
                    sendToPrinter(barcode);
                } else if (result.isDenied) {
                    // ตรงนี้สามารถเพิ่ม logic requireAdminAuth แบบเดิมได้
                    Swal.fire('Coming Soon', 'ระบบแก้ไขราคากำลังปรับปรุง', 'info');
                    if(scanner) scanner.resume();
                } else {
                    if(scanner) scanner.resume();
                }
            });
        }

        function sendToPrinter(barcode) {
            const topic = 'my-shop-barcode-sync-' + document.getElementById('scanner-id').value;
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(topic, JSON.stringify({ barcode: barcode }));
                
                // Visual Feedback ว่าส่งสำเร็จ
                document.getElementById('main-body').classList.add('sync-flash');
                setTimeout(() => document.getElementById('main-body').classList.remove('sync-flash'), 400);
                
                document.getElementById('res-name').innerText = "ส่งข้อมูลสำเร็จ ✓";
                document.getElementById('res-name').style.color = "var(--g)";
            } else {
                Swal.fire('Error', 'MQTT Offline', 'error');
            }
            if(scanner) scanner.resume();
        }

        // Init
        loadDatabase();
        setupMQTT();
    </script>
</body>
</html>
